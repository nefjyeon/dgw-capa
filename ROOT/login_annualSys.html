<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동원대학교 연간업무계획관리시스템 - 로그인</title>
  <link rel="stylesheet" href="/css/login_annualSys.css">
  
</head>
<body>

  <div class="wrap">
    <header>
      <h1><img src="img/logo_tongwon.svg" alt="동원대학교"></h1>
    </header>
    <div class="inner">

      <section class="login-section">
        <!-- 비주얼 영역 패널 -->
        <div class="notice-panel panel">
          <h2><img src="img/logo_tongwonAnnualSys-wh.svg" alt="동원대학교 연간업무계획관리시스템"></h2>
          <p>
            직원들의 업무계획과 진행결과를 체계적으로 <br>
            관리하여 직원들의 역량을 증진시키고 업무계획 및 <br>
            관리를 지원하는 시스템 입니다.
          </p>
          <div class="wrap_img">
            <img src="img/annual_vis.png" alt="">
          </div>
        </div>
        <!-- 로그인 영역 패널 -->
        <div class="login-panel panel">
          <h2>LOGIN</h2>
          <p>서비스를 이용하시려면 로그인이 필요합니다.</p>
          
          <form action="">

            <div class="wrap-input input-effect">
              <input class="effect-21" type="text" placeholder="">
              <label>교직원번호</label>
              <span class="focus-border">
                <i></i>
              </span>
            </div>

            <div class="wrap-input input-effect">
              <input class="effect-21" type="password" placeholder="">
              <label>비밀번호</label>
              <span class="focus-border">
                <i></i>
              </span>
            </div>

            <button class="btn-login" type="submit">로그인</button>
            <div class="chkline">
              <p class="chk -ask">
                <input type="checkbox" id="term_chk"><label for="term_chk"><span>교직원번호 저장</span></label>
              </p>
              <a href="">교직원번호 찾기</a>
            </div>
          </form>
        </div>
      </section>

      <!-- 배너형 버튼 영역 -->
      <section class="btn-section">
        <a href="https://tw.ac.kr/" class="btn raise"><img src="img/icon_uni.png" alt=""><span>동원대학교 대표 홈페이지</span></a>
        <a href="https://tos.tw.ac.kr/svc/tk/Auth.do?ac=Y&ifa=N&id=portal&" class="btn raise"><img src="img/icon_iSystem.png" alt=""><span>통합정보시스템</span></a>
      </section>
    </div>
    <footer>
      <div class="footer-logo"><img src="img/logo_tongwonAnnualSys-gr.svg" alt="동원대학교 연간업무계획관리시스템"></div>
      <div class="footer-info">
        <address><span>(12813) 경기 광주시 곤지암읍 경충대로 26 (신촌리, 동원대학) 동원대학교<br>일반대표전화 031-799-8888</span><span>전국대표전화 1544-4114</span><span>FAX 031-763-8549</span>
        </address>
        <p class="copyright">COPYRIGHT@ TONGWON UNIVERSITY. All Rights Reserved.</p>
      </div>

    </footer>
  </div>
  
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script type="text/javascript">

      $(window).on('load', function() {
        $(".wrap-input input").val("");
        
        $(".input-effect input").focusout(function(){
          if($(this).val() != ""){
            $(this).addClass("has-content");
          }else{
            $(this).removeClass("has-content");
          }
        })
      });

  </script>

</body>
</html>
