<head>
<meta charset="utf-8">
<title>샘플</title>

<body>

<div id="wrap-new">
	
	<!-- 체크박스 샘플 작업 -->


	<style>
		/* 20250829 연수운영관리 셀렉트박스 ->> 체크박스 변경 속성 시작 */
		.select_box.single {
			float:inherit;
			padding-bottom:3px;
		}
		.chk_list {
			display:flex;
			flex-direction:row;
			padding:3px 0;
		}
		.chk_list>ul {
			display:flex;
			flex-direction:row;
			flex-wrap:wrap;
		}
		.chk_list>p {
			font-weight:500;
			padding-right:10px;
			padding:3px 0;
		}
		.chk_list>ul>li {
			margin-left:20px;
			padding:3px 0;
		}
		.chk_list>ul>li input {
			width:18px;
			height:18px;
			vertical-align:sub;
		}
		.chk_list>ul>li span {
			vertical-align:top;
		}
		.sub_sch_wrap>.chk_list:nth-child(5) {
			padding-bottom:9px;
		}
		/* 20250829 연수운영관리 셀렉트박스 ->> 체크박스 변경 속성 끝 */

		
	</style>


	<div class="select_box w130p single">
		<select name="yr" onchange="goSearch();">
			<option value="">년도</option>
			<option value="2026">2026년도</option>
			<option value="2025">2025년도</option>
			<option value="2024">2024년도</option>
			<option value="2023">2023년도</option>
			<option value="2022">2022년도</option>
			<option value="2021">2021년도</option>

			<option value="2018">2018년도</option>
			<option value="2017">2017년도</option>
			<option value="2016">2016년도</option>
		</select>
	</div>

			<li>

			<li>
